    <text x="954" y="225" fill="#e0e7ff" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">FastAPI</text>
    <text x="1056" y="225" fill="#e0f2fe" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Node</text>
